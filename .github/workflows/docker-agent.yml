name: Build & Push docker AGENT containers

on:
  workflow_run:
    workflows: [Tests]
    types: [completed]
    branches:
      - main
      - 'releases/**'

jobs:
  call-docker-workflow:
    uses: nostriphant/.github/workflows/docker.yml
    with:
      registry_image: nostriphant/transpher-agent
      docker_file: ./docker/agent.Dockerfile
      platforms: linux/amd64,linux/arm64,linux/arm/v7
      dockerhub_username: ${{ vars.DOCKERHUB_USERNAME }}
    secrets:
      dockerhub_token: ${{ secrets.DOCKERHUB_TOKEN }}